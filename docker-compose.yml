services:
  compliance-checker:
    build:
      context: .
      dockerfile: Dockerfile
    image: gitlab-compliance-checker:latest
    container_name: gitlab-compliance-checker
    ports:
      - "8501:8501"
    environment:
      - GITLAB_URL=${GITLAB_URL:-https://code.swecha.org}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
